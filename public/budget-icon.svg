<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background: deep indigo rounded square -->
  <rect width="100" height="100" rx="22" fill="#1e1b4b"/>

  <!-- Subtle inner glow -->
  <rect width="100" height="100" rx="22" fill="url(#bg-glow)" opacity="0.6"/>

  <!-- Bar chart: three bars ascending left to right -->
  <rect x="14" y="58" width="19" height="28" rx="4" fill="#4f46e5" opacity="0.65"/>
  <rect x="40" y="38" width="19" height="48" rx="4" fill="#6366f1"/>
  <rect x="66" y="46" width="19" height="40" rx="4" fill="#818cf8" opacity="0.85"/>

  <!-- Trend line connecting bar peaks -->
  <polyline
    points="23.5,54 49.5,34 75.5,42"
    fill="none"
    stroke="#c7d2fe"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.9"
  />

  <!-- Dots at each peak -->
  <circle cx="23.5" cy="54" r="3.5" fill="#e0e7ff"/>
  <circle cx="49.5" cy="34" r="3.5" fill="#e0e7ff"/>
  <circle cx="75.5" cy="42" r="3.5" fill="#e0e7ff"/>

  <defs>
    <radialGradient id="bg-glow" cx="30%" cy="80%" r="70%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
